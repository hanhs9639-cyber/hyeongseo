<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>스터디카페 키오스크</title>
<style>

html,body{margin:0;padding:0;width:100%;height:100%;font-family:sans-serif;background:#1a1208;display:flex;justify-content:center;align-items:center;}
#app{width:956px;height:827px;display:flex;flex-shrink:0;}
.mapcol{width:726px;height:827px;display:flex;flex-direction:column;flex-shrink:0;}
.mhdr{background:#120c04;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #3a2a14;flex-shrink:0;}
.mtitle{font-size:16px;font-weight:bold;color:#f0c060;letter-spacing:2px;}
.leg{display:flex;gap:12px;}
.li{display:flex;align-items:center;gap:4px;font-size:13px;color:#b09060;}
.dot{width:11px;height:11px;border-radius:2px;}
.mapwrap{flex:1;position:relative;overflow:hidden;background:#1c1208;}
.mapwrap img{width:100%;height:100%;object-fit:contain;object-position:center;display:block;pointer-events:none;}
.sl{position:absolute;top:0;left:0;width:100%;height:100%;}
.side{width:230px;height:827px;background:#120c04;border-left:1px solid #3a2a14;display:flex;flex-direction:column;flex-shrink:0;}
.sec{padding:14px;border-bottom:1px solid #2a1a08;}
.seclbl{font-size:13px;font-weight:bold;color:#f0c060;letter-spacing:1.5px;display:block;margin-bottom:10px;}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
button.tt{background:#1c1208;border:1px solid #3a2a14;border-radius:6px;padding:8px 4px;text-align:center;cursor:pointer;color:#c8a87a;font-size:14px;font-family:sans-serif;line-height:1.4;width:100%;}
button.tt:hover{background:#2a1a08;}
button.tt.on{background:#3a2a08;border-color:#f0c060;color:#f0c060;}
button.tt small{display:block;font-size:12px;color:#7a6040;margin-top:2px;}
button.tt.on small{color:#c0a040;}
.sinfo{flex:1;padding:14px;overflow:hidden;}
.hint{color:#6a5030;font-size:14px;text-align:center;padding-top:20px;line-height:1.8;}
.irow{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px;}
.ilbl{color:#7a6040;}.ival{color:#e0c090;font-weight:500;}
.badge{background:#1c1208;border:1px solid #3a2a14;border-radius:4px;padding:3px 8px;font-size:14px;color:#e0c090;}
.note{margin-top:8px;background:#080804;border-radius:6px;padding:10px;font-size:13px;color:#7a6040;line-height:1.7;}
.bot{padding:14px;border-top:1px solid #2a1a08;flex-shrink:0;}
.trow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.tlbl{font-size:14px;font-weight:bold;color:#f0c060;}.tamt{font-size:24px;font-weight:bold;color:#f0c060;}
button.pbtn{width:100%;padding:14px;background:#f0c060;border:none;border-radius:8px;font-size:17px;font-weight:bold;color:#1c1208;cursor:pointer;font-family:sans-serif;}
button.pbtn:hover{background:#ffe080;}
button.pbtn:disabled{background:#3a2a14;color:#6a5030;cursor:default;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;align-items:center;justify-content:center;}
.modal.on{display:flex;}
.mbox{background:#120c04;border:2px solid #f0c060;border-radius:12px;padding:24px;text-align:center;width:280px;}
.mtxt{font-size:14px;font-weight:bold;color:#f0c060;margin-bottom:12px;line-height:1.7;}
.mbody{font-size:14px;color:#b09060;line-height:2;}
.mbtns{display:flex;gap:8px;margin-top:16px;}
button.mb{flex:1;padding:11px;border-radius:6px;font-size:15px;font-weight:bold;cursor:pointer;border:none;font-family:sans-serif;}
button.mc{background:#1c1208;border:1px solid #3a2a14;color:#b09060;}
button.mk{background:#f0c060;color:#1c1208;}

</style>
</head>

<div class="side">
<div class="sec"><span class="seclbl">이용 시간</span><div class="tgrid">
<button class="tt" data-m="60"    onclick="pickT(this)">1시간<small>1,500원</small></button>
<button class="tt on" data-m="120" onclick="pickT(this)">2시간<small>2,500원</small></button>
<button class="tt" data-m="240"   onclick="pickT(this)">4시간<small>4,500원</small></button>
<button class="tt" data-m="480"   onclick="pickT(this)">8시간<small>8,000원</small></button>
<button class="tt" data-m="1440"  onclick="pickT(this)">1일권<small>15,000원</small></button>
<button class="tt" data-m="10080" onclick="pickT(this)">1주일권<small>50,000원</small></button>
</div></div>
<div class="sinfo" id="sinfo"><div class="hint">지도에서 빈자리를<br>선택해 주세요</div></div>
<div class="bot"><div class="trow"><span class="tlbl">합계</span><span class="tamt" id="tot">0원</span></div>
<button class="pbtn" id="paybtn" disabled onclick="openPay()">결제하기</button></div>
</div>
</div>
<div class="modal" id="pmodal"><div class="mbox"><div class="mtxt">결제를 진행할까요?</div><div class="mbody" id="pdetail"></div><div class="mbtns"><button class="mb mc" onclick="closePay()">취소</button><button class="mb mk" onclick="doPay()">결제</button></div></div></div>
<div class="modal" id="okmodal"><div class="mbox" style="border-color:#4caf7d;background:#041004"><div style="font-size:36px;margin-bottom:8px">🎉</div><div class="mtxt" style="color:#4caf7d">이용권 발급 완료!</div><div class="mbody" style="color:#80c890" id="okdetail"></div><div class="mbtns"><button class="mb mk" onclick="closeOk()">확인</button></div></div></div>
<script>

var SEATS=[
  {id:'A1',x:125,y:219,occ:false,zone:'개인석'},
  {id:'A2',x:185,y:219,occ:false,zone:'개인석'},
  {id:'A3',x:242,y:219,occ:true,zone:'개인석'},
  {id:'A4',x:301,y:219,occ:false,zone:'개인석'},
  {id:'A5',x:363,y:219,occ:false,zone:'개인석'},
  {id:'A6',x:422,y:219,occ:false,zone:'개인석'},
  {id:'A7',x:483,y:219,occ:false,zone:'개인석'},
  {id:'A8',x:547,y:219,occ:true,zone:'개인석'},
  {id:'B1',x:215,y:350,occ:false,zone:'공용책상'},
  {id:'B2',x:268,y:350,occ:false,zone:'공용책상'},
  {id:'B3',x:328,y:350,occ:false,zone:'공용책상'},
  {id:'B4',x:380,y:350,occ:true,zone:'공용책상'},
  {id:'B5',x:442,y:350,occ:false,zone:'공용책상'},
  {id:'B6',x:495,y:350,occ:false,zone:'공용책상'},
  {id:'B7',x:211,y:456,occ:true,zone:'공용책상'},
  {id:'B8',x:268,y:456,occ:false,zone:'공용책상'},
  {id:'B9',x:328,y:456,occ:false,zone:'공용책상'},
  {id:'B10',x:382,y:456,occ:false,zone:'공용책상'},
  {id:'B11',x:443,y:456,occ:false,zone:'공용책상'},
  {id:'B12',x:500,y:456,occ:true,zone:'공용책상'},
  {id:'C1',x:631,y:272,occ:false,zone:'개인석'},
  {id:'C2',x:631,y:339,occ:true,zone:'개인석'},
  {id:'C3',x:631,y:404,occ:false,zone:'개인석'},
  {id:'C4',x:631,y:470,occ:false,zone:'개인석'}
];
var PR={60:1500,120:2500,240:4500,480:8000,1440:15000,10080:50000};
var PL={60:"1시간",120:"2시간",240:"4시간",480:"8시간",1440:"1일권",10080:"1주일권"};
var curS=null,selM=120;

function dk(){
  var L=document.getElementById('kseats');
  L.innerHTML='';
  var sz=35;
  for(var i=0;i<SEATS.length;i++){
    var s=SEATS[i];
    var el=document.createElement('div');
    el.style.position='absolute';
    el.style.borderRadius='50%';
    el.style.transform='translate(-50%,-50%)';
    el.style.left=s.x+'px';
    el.style.top=s.y+'px';
    el.style.width=sz+'px';
    el.style.height=sz+'px';
    if(s.occ){
      el.style.border='2.5px solid transparent';
      el.style.background='transparent';
      el.style.pointerEvents='none';
    } else if(curS===s.id){
      el.style.border='2.5px solid #f0c060';
      el.style.background='rgba(240,192,96,0.3)';
      el.style.cursor='pointer';
      el.style.boxShadow='0 0 12px rgba(240,192,96,0.5)';
    } else {
      el.style.border='2.5px solid rgba(90,200,120,0.9)';
      el.style.background='rgba(90,200,120,0.2)';
      el.style.cursor='pointer';
    }
    if(!s.occ){(function(sid){el.onclick=function(){selS(sid);};})(s.id);}
    L.appendChild(el);
    var lb=document.createElement('div');
    lb.style.position='absolute';
    lb.style.transform='translateX(-50%)';
    lb.style.left=s.x+'px';
    lb.style.fontSize='10px';
    lb.style.color='#f0c060';
    lb.style.fontWeight='bold';
    lb.style.pointerEvents='none';
    lb.style.whiteSpace='nowrap';
    lb.textContent=s.id;
    var isAB=s.id[0]==='A'||s.id[0]==='B';
    lb.style.top=(s.y+sz/2+(isAB?10:2))+'px';
    L.appendChild(lb);
  }
}

function selS(id){curS=(curS===id)?null:id;dk();up();}

function up(){
  var pb=document.getElementById('paybtn');
  var ta=document.getElementById('tot');
  var si=document.getElementById('sinfo');
  if(!curS){
    si.innerHTML='<div class="hint">지도에서 빈자리를<br>선택해 주세요</div>';
    pb.disabled=true;ta.textContent='0원';return;
  }
  var s=null;
  for(var i=0;i<SEATS.length;i++){if(SEATS[i].id===curS){s=SEATS[i];break;}}
  var p=PR[selM];
  ta.textContent=p.toLocaleString()+'원';
  pb.disabled=false;
  var t=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  si.innerHTML='<div class="irow"><span class="ilbl">좌석</span><span class="badge">'+s.id+' ('+s.zone+')</span></div>'
    +'<div class="irow"><span class="ilbl">이용시간</span><span class="ival">'+PL[selM]+'</span></div>'
    +'<div class="irow"><span class="ilbl">금액</span><span class="ival">'+p.toLocaleString()+'원</span></div>'
    +'<div class="note">'+t+'부터<br>'+PL[selM]+' 이용 가능합니다</div>';
}

function pickT(el){
  var btns=document.querySelectorAll('.tt');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('on');
  el.classList.add('on');
  selM=parseInt(el.dataset.m);
  up();
}

function openPay(){
  var s=null;
  for(var i=0;i<SEATS.length;i++){if(SEATS[i].id===curS){s=SEATS[i];break;}}
  var p=PR[selM];
  document.getElementById('pdetail').innerHTML='좌석: <b style="color:#f0c060">'+s.id+'</b><br>이용: <b style="color:#f0c060">'+PL[selM]+'</b><br>결제: <b style="color:#f0c060">'+p.toLocaleString()+'원</b>';
  document.getElementById('pmodal').classList.add('on');
}
function closePay(){document.getElementById('pmodal').classList.remove('on');}
function doPay(){
  closePay();
  var s=null;
  for(var i=0;i<SEATS.length;i++){if(SEATS[i].id===curS){s=SEATS[i];break;}}
  var p=PR[selM];
  document.getElementById('okdetail').innerHTML='🎫 <b style="color:#4caf7d">'+s.id+'</b> 좌석<br>'+PL[selM]+' 이용권<br><b>'+p.toLocaleString()+'원</b> 결제 완료<br><br>즐거운 공부 되세요! 📚';
  document.getElementById('okmodal').classList.add('on');
  s.occ=true;curS=null;dk();up();
}
function closeOk(){document.getElementById('okmodal').classList.remove('on');}

window.onload=function(){dk();};

</script>
